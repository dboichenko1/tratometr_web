<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Тратометр</title>
  <meta name="description" content="Офлайн-трекер личных финансов. Работает без сети." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#101513" />

  <!-- iOS: установка на рабочий стол, полноэкранный режим -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Тратометр" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png?v=4" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png?v=4" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=4" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=4" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=4" />

  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="root">
    <div id="boot" class="boot"><div class="boot-spinner"></div></div>
  </div>

  <script>
    // Регистрируем service worker — без него нет офлайна. Путь относительный,
    // поэтому scope совпадает с папкой приложения (корень или подпапка Pages).
    if ('serviceWorker' in navigator) {
      // Когда новая версия SW берёт управление — перезагружаемся один раз,
      // чтобы обновление подхватывалось с первого переоткрытия, а не «висело»
      // в кэше. Флаг refreshing защищает от цикла перезагрузок.
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          // Проверяем обновление при каждом запуске — иначе новая версия может
          // не подтянуться, пока браузер сам не решит обновить SW.
          reg.update().catch(() => {});
        }).catch(() => {});
      });
    }
    // Просим браузер не вытеснять данные (важно для iOS PWA — иначе историю
    // операций может стереть при нехватке места / долгом простое).
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist().catch(() => {});
    }
  </script>
  <script src="xlsx.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
